<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI Draft Reply</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; padding: 20px; }
    button {
      background: #2b579a; color: white; border: none;
      padding: 10px 16px; border-radius: 4px; font-size: 14px; cursor: pointer;
    }
    button:disabled { background: #999; cursor: default; }
    #status { margin-top: 12px; font-size: 13px; color: #444; }
  </style>
</head>
<body>
  <h3>AI Draft Reply</h3>
  <p>Click below to generate an AI draft reply for the currently open email.</p>
  <button id="draftBtn">Draft with AI</button>
  <div id="status"></div>

  <script src="taskpane.js"></script>
</body>
</html>
